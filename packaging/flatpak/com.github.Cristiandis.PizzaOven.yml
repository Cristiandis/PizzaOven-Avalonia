app-id: com.github.Cristiandis.PizzaOven
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8

command: pizzaoven

build-options:
  prepend-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  prepend-pkg-config-path: /usr/lib/sdk/dotnet8/lib/pkgconfig
  env:
    DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    DOTNET_NOLOGO: '1'
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
    MSBUILDDISABLENODEREUSE: '1'

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=~/.local/share/Steam
  - --filesystem=~/.steam
  - --talk-name=com.valvesoftware.Steam
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.OpenURI
  - --env=DOTNET_ROOT=/app/lib/dotnet
  - --own-name=com.github.Cristiandis.PizzaOven
  - --filesystem=xdg-run/discord-ipc-0
  - --filesystem=xdg-run/app/com.discordapp.Discord
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: dotnet
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/dotnet8/bin/install.sh

  - name: pizzaoven
    buildsystem: simple

    sources:
      - type: dir
        path: ../../
      - nuget-sources.json

    build-commands:
      - |
        dotnet publish PizzaOven/PizzaOven.csproj \
          -c Release \
          -r linux-x64 \
          --no-self-contained \
          --source ./nuget-sources \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -o /app/bin

      - install -Dm755 PizzaOven/Dependencies/xdelta3 /app/bin/Dependencies/xdelta3

      - |
        if [ -f PizzaOven/Dependencies/DepotDownloader-linux/DepotDownloader ]; then
          install -Dm755 \
            PizzaOven/Dependencies/DepotDownloader-linux/DepotDownloader \
            /app/bin/Dependencies/DepotDownloader-linux/DepotDownloader
        fi

      - install -Dm644 packaging/flatpak/com.github.Cristiandis.PizzaOven.desktop
          /app/share/applications/com.github.Cristiandis.PizzaOven.desktop

      - install -Dm644 PizzaOven/Assets/PizzaOvenIcon.png
          /app/share/icons/hicolor/256x256/apps/com.github.Cristiandis.PizzaOven.png

      - install -Dm644 packaging/flatpak/com.github.Cristiandis.PizzaOven.metainfo.xml
          /app/share/metainfo/com.github.Cristiandis.PizzaOven.metainfo.xml

      - |
        printf '#!/bin/sh\nif echo "$1" | grep -q "^pizzaovenplus:"; then\n    exec /app/bin/PizzaOven -download "$@"\nelse\n    exec /app/bin/PizzaOven "$@"\nfi\n' > /app/bin/pizzaoven
      - chmod 755 /app/bin/pizzaoven

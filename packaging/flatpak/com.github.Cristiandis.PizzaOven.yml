app-id: com.github.Cristiandis.PizzaOven
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8

command: pizzaoven

build-options:
  prepend-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  prepend-pkg-config-path: /usr/lib/sdk/dotnet8/lib/pkgconfig
  env:
    DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    DOTNET_NOLOGO: '1'
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
    MSBUILDDISABLENODEREUSE: '1'

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=~/.local/share/Steam
  - --filesystem=~/.steam
  - --talk-name=com.valvesoftware.Steam
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.OpenURI
  - --env=DOTNET_ROOT=/app/lib/dotnet
  - --own-name=com.github.Cristiandis.PizzaOven
  - --filesystem=xdg-run/keyring

modules:
  - name: dotnet-sdk
    buildsystem: simple
    build-commands:
      - |
        mkdir -p /app/lib/dotnet
        cp -r /usr/lib/sdk/dotnet8/* /app/lib/dotnet/

  - name: pizzaoven
    buildsystem: simple
    sources:
      - type: dir
        path: ../../
      - type: file
        path: nuget-sources.json
    build-commands:
      - |
        mkdir nuget-sources
        tar -xf nuget-sources.json -C nuget-sources
      - |
        dotnet publish PizzaOven/PizzaOven.csproj \
          -c Release \
          -r linux-x64 \
          --no-self-contained \
          --source ./nuget-sources \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -o /app/bin

      - install -Dm755 PizzaOven/Dependencies/xdelta3 /app/bin/Dependencies/xdelta3

      - |
        if [ -f PizzaOven/Dependencies/DepotDownloader-linux/DepotDownloader ]; then
          install -Dm755 \
            PizzaOven/Dependencies/DepotDownloader-linux/DepotDownloader \
            /app/bin/Dependencies/DepotDownloader-linux/DepotDownloader
        fi

      - |
        cat > /app/bin/pizzaoven <<'EOF'
        #!/bin/sh
        # Se il primo argomento inizia con il protocollo di GameBanana, inserisce automaticamente -download
        if echo "$1" | grep -q "^pizzaovenplus:"; then
            exec /app/bin/PizzaOven -download "$@"
        else
            exec /app/bin/PizzaOven "$@"
        fi
        EOF
      - chmod 755 /app/bin/pizzaoven

      - install -Dm644 packaging/flatpak/com.github.Cristiandis.PizzaOven.desktop /app/share/applications/com.github.Cristiandis.PizzaOven.desktop

      - install -Dm644 packaging/flatpak/com.github.Cristiandis.PizzaOven.metainfo.xml /app/share/metainfo/com.github.Cristiandis.PizzaOven.metainfo.xml

      - |
        for size in 16 32 48 64 128 256 512; do
          if [ -f PizzaOven/Assets/PizzaOvenIcon.png ]; then
            install -Dm644 PizzaOven/Assets/PizzaOvenIcon.png /app/share/icons/hicolor/${size}x${size}/apps/com.github.Cristiandis.PizzaOven.png
          fi
        done

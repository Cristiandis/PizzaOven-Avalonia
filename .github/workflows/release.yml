name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Linux
        run: |
          cd PizzaOven
          dotnet publish -c Release -r linux-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ../publish/linux

      - name: Create tarball
        run: |
          cp PizzaOven/Assets/PizzaOvenIcon.png publish/linux/pizzaoven.png
          mkdir -p publish/linux/Dependencies
          cp -r PizzaOven/Dependencies/* publish/linux/Dependencies/ 2>/dev/null || cp -r Dependencies/* publish/linux/Dependencies/
          cd publish/linux
          tar -czf ../../PizzaOven-linux-x64.tar.gz .

      - name: Upload linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: PizzaOven-linux-x64.tar.gz

  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder python3-pip
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
          sudo flatpak install -y flathub org.freedesktop.Sdk.Extension.dotnet8//24.08

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate NuGet sources
        run: |
          pip install aiohttp
          python3 packaging/flatpak/flatpak-dotnet-generator.py \
            nuget-sources.json \
            PizzaOven/PizzaOven.csproj \
            --dotnet 8 --freedesktop 24.08 --runtime linux-x64

      - name: Build Flatpak
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # Rewrite source to use the current git tag instead of local dir
          sed -i 's|type: dir|type: git|' packaging/flatpak/com.github.Cristiandis.PizzaOven.yml
          sed -i "s|path: ../../|url: https://github.com/Cristiandis/PizzaOven-Avalonia.git\n        tag: ${GITHUB_REF_NAME}|" \
            packaging/flatpak/com.github.Cristiandis.PizzaOven.yml

          echo "$GPG_PRIVATE_KEY" | gpg --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5)

          flatpak-builder \
            --repo=flatpak-repo \
            --gpg-sign="$KEY_ID" \
            --force-clean \
            build-dir \
            packaging/flatpak/com.github.Cristiandis.PizzaOven.yml

          flatpak build-update-repo --gpg-sign="$KEY_ID" flatpak-repo

          gpg --export "$KEY_ID" > pizzaoven.gpg
          GPG_B64=$(base64 --wrap=0 < pizzaoven.gpg | tr -d '\n\r ')
          
          printf "%s\n" \
            "[Flatpak Repo]" \
            "Title=PizzaOven" \
            "Url=https://cristiandis.github.io/PizzaOven-Avalonia" \
            "Homepage=https://github.com/Cristiandis/PizzaOven-Avalonia" \
            "Comment=PizzaOven Flatpak Repository" \
            "GPGKey=$GPG_B64" \
            > flatpak-repo/pizzaoven.flatpakrepo

      - name: Create bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            PizzaOven-linux-x64.flatpak \
            com.github.Cristiandis.PizzaOven

      - name: Upload flatpak bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: PizzaOven-linux-x64.flatpak

      - name: Upload flatpak repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: flatpak-repo/

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows
        run: |
          cd PizzaOven
          dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ../publish/windows

      - name: Zip Windows build
        run: |
          Compress-Archive -Path publish/windows/* -DestinationPath PizzaOven-windows-x64.zip

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: PizzaOven-windows-x64.zip

  release:
    needs:
      - build-linux
      - build-flatpak
      - build-windows

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD sha256sum
        run: |
          SHA256=$(sha256sum artifacts/linux-tarball/PizzaOven-linux-x64.tar.gz | awk '{print $1}')
          sed -i "s/sha256sums=('SKIP'/sha256sums=('$SHA256'/" packaging/PKGBUILD

      - name: Push Flatpak repo to gh-pages
        run: |
          cd artifacts/flatpak-repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cristiandis/PizzaOven-Avalonia.git
          git checkout -b flatpak-repo
          git add .
          git commit -m "Flatpak repo update ${{ github.ref_name }}"
          git push --force origin flatpak-repo

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pizza Oven v${{ steps.version.outputs.VERSION }}
          body: |
            ## Pizza Oven v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **Windows**: `PizzaOven-windows-x64.zip`
            - **Linux (tarball)**: `PizzaOven-linux-x64.tar.gz`
            - **Linux (Flatpak bundle)**: `PizzaOven-linux-x64.flatpak`
            - **Arch Linux**: Use the PKGBUILD from the `packaging/` folder or install via [AUR](https://aur.archlinux.org/packages/pizzaoven-bin)

            ### Installing the Flatpak (recommended)
            Add the repo once, then install and get automatic updates:
            ```sh
            flatpak remote-add --if-not-exists pizzaoven https://cristiandis.github.io/PizzaOven-Avalonia/pizzaoven.flatpakrepo
            flatpak install pizzaoven com.github.Cristiandis.PizzaOven
            ```

            Or install the bundle directly (no automatic updates):
            ```sh
            flatpak install PizzaOven-linux-x64.flatpak
            ```

            ### Requirements
            - .NET 8 Runtime (not needed for Flatpak — it's bundled)

          files: |
            artifacts/linux-tarball/PizzaOven-linux-x64.tar.gz
            artifacts/flatpak-bundle/PizzaOven-linux-x64.flatpak
            artifacts/windows-zip/PizzaOven-windows-x64.zip
            packaging/PKGBUILD

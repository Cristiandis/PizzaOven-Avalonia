name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Linux
        run: |
          cd PizzaOven
          dotnet publish -c Release -r linux-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ../publish/linux

      - name: Create tarball
        run: |
          cp PizzaOven/Assets/PizzaOvenIcon.png publish/linux/pizzaoven.png
          mkdir -p publish/linux/Dependencies
          cp -r PizzaOven/Dependencies/* publish/linux/Dependencies/ 2>/dev/null || cp -r Dependencies/* publish/linux/Dependencies/
          cd publish/linux
          tar -czf ../../PizzaOven-linux-x64.tar.gz .

      - name: Upload linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: PizzaOven-linux-x64.tar.gz

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKGNAME="pizzaoven"
          ARCH="amd64"
          PKGDIR="${PKGNAME}_${VERSION}_${ARCH}"

          mkdir -p "$PKGDIR/DEBIAN"
          mkdir -p "$PKGDIR/usr/lib/pizzaoven"
          mkdir -p "$PKGDIR/usr/bin"
          mkdir -p "$PKGDIR/usr/share/applications"
          mkdir -p "$PKGDIR/usr/share/icons/hicolor/256x256/apps"

          cp -r publish/linux/. "$PKGDIR/usr/lib/pizzaoven/"

          chmod -f 755 "$PKGDIR/usr/lib/pizzaoven/Dependencies/DepotDownloader-linux/DepotDownloader" || true
          chmod -f 755 "$PKGDIR/usr/lib/pizzaoven/Dependencies/xdelta3" || true
          find "$PKGDIR/usr/lib/pizzaoven/GMLOADER-linux" -type f -exec chmod 755 {} + 2>/dev/null || true
          find "$PKGDIR/usr/lib/pizzaoven/GMLOADER-windows" -type f -exec chmod 755 {} + 2>/dev/null || true

          printf '%s\n' \
            'Package: pizzaoven' \
            "Version: ${VERSION}" \
            'Section: games' \
            'Priority: optional' \
            'Architecture: amd64' \
            'Depends: dotnet-runtime-8.0' \
            'Maintainer: Cristiandis <pizzaoven@izzoserver.top>' \
            'Homepage: https://github.com/Cristiandis/PizzaOven-Avalonia' \
            'Description: Cross-platform mod manager for Pizza Tower' \
            ' Pizza Oven allows you to download, install, and manage mods' \
            ' for Pizza Tower using GameBanana integration.' \
            > "$PKGDIR/DEBIAN/control"

          printf '%s\n' \
            '#!/bin/sh' \
            'exec /usr/lib/pizzaoven/PizzaOven "$@"' \
            > "$PKGDIR/usr/bin/pizzaoven"

          chmod 755 "$PKGDIR/usr/bin/pizzaoven"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Pizza Oven+' \
            'Comment=Mod manager for Pizza Tower' \
            'Exec=/usr/bin/pizzaoven' \
            'Icon=pizzaoven' \
            'Type=Application' \
            'Categories=Game;' \
            > "$PKGDIR/usr/share/applications/pizzaoven.desktop"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=Pizza Oven+' \
            'Exec=/usr/bin/pizzaoven -download %u' \
            'Type=Application' \
            'NoDisplay=true' \
            'MimeType=x-scheme-handler/pizzaovenplus;' \
            > "$PKGDIR/usr/share/applications/pizzaoven-handler.desktop"

          cp PizzaOven/Assets/PizzaOvenIcon.png \
            "$PKGDIR/usr/share/icons/hicolor/256x256/apps/pizzaoven.png"

          printf '%s\n' \
            '#!/bin/sh' \
            'xdg-mime default pizzaoven-handler.desktop x-scheme-handler/pizzaovenplus' \
            'update-desktop-database /usr/share/applications || true' \
            > "$PKGDIR/DEBIAN/postinst"

          chmod 755 "$PKGDIR/DEBIAN/postinst"

          dpkg-deb --build "$PKGDIR"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: pizzaoven_*.deb

      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          sudo apt-get update
          sudo apt-get install -y rpm

          mkdir -p ~/rpmbuild/BUILD
          mkdir -p ~/rpmbuild/RPMS
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          mkdir -p ~/rpmbuild/SRPMS

          cp PizzaOven-linux-x64.tar.gz ~/rpmbuild/SOURCES/

          SPEC=~/rpmbuild/SPECS/pizzaoven.spec

          printf '%s\n' \
            'Name: pizzaoven' \
            "Version: ${VERSION}" \
            'Release: 1' \
            'Summary: Cross-platform mod manager for Pizza Tower' \
            '' \
            'License: GPLv3' \
            'URL: https://github.com/Cristiandis/PizzaOven-Avalonia' \
            'Source0: PizzaOven-linux-x64.tar.gz' \
            '' \
            'Requires: dotnet-runtime-8.0' \
            '' \
            'BuildArch: x86_64' \
            '' \
            '%description' \
            'Pizza Oven allows downloading and managing Pizza Tower mods.' \
            '' \
            '%prep' \
            '%setup -q -c' \
            '' \
            '%install' \
            'mkdir -p %{buildroot}/usr/lib/pizzaoven' \
            'cp -r * %{buildroot}/usr/lib/pizzaoven/' \
            '' \
            'mkdir -p %{buildroot}/usr/bin' \
            'printf "#!/bin/sh\nexec /usr/lib/pizzaoven/PizzaOven \"\$@\"\n" > %{buildroot}/usr/bin/pizzaoven' \
            'chmod 755 %{buildroot}/usr/bin/pizzaoven' \
            'chmod -f 755 %{buildroot}/usr/lib/pizzaoven/Dependencies/DepotDownloader-linux/DepotDownloader || true' \
            'chmod -f 755 %{buildroot}/usr/lib/pizzaoven/Dependencies/xdelta3 || true' \
            '' \
            'mkdir -p %{buildroot}/usr/share/applications' \
            'printf "[Desktop Entry]\nName=Pizza Oven+\nComment=Mod manager for Pizza Tower\nExec=/usr/bin/pizzaoven\nIcon=pizzaoven\nType=Application\nCategories=Game;\n" > %{buildroot}/usr/share/applications/pizzaoven.desktop' \
            'printf "[Desktop Entry]\nName=Pizza Oven+\nExec=/usr/bin/pizzaoven -download %%u\nType=Application\nNoDisplay=true\nMimeType=x-scheme-handler/pizzaovenplus;\n" > %{buildroot}/usr/share/applications/pizzaoven-handler.desktop' \
            '' \
            'mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps' \
            'cp pizzaoven.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/pizzaoven.png' \
            '' \
            '%post' \
            'xdg-mime default pizzaoven-handler.desktop x-scheme-handler/pizzaovenplus' \
            'update-desktop-database /usr/share/applications || true' \
            '' \
            '%files' \
            '/usr/lib/pizzaoven' \
            '/usr/bin/pizzaoven' \
            '/usr/share/applications/pizzaoven.desktop' \
            '/usr/share/applications/pizzaoven-handler.desktop' \
            '/usr/share/icons/hicolor/256x256/apps/pizzaoven.png' \
            > "$SPEC"

          rpmbuild -ba "$SPEC"

          cp ~/rpmbuild/RPMS/x86_64/pizzaoven-*.rpm .

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: pizzaoven-*.rpm

  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder python3-pip
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
          sudo flatpak install -y flathub org.freedesktop.Sdk.Extension.dotnet8//24.08

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate NuGet sources
  run: |
    pip install aiohttp
    python3 packaging/flatpak/flatpak-dotnet-generator.py \
      nuget-sources.json \
      PizzaOven/PizzaOven.csproj \
      --dotnet 8 --freedesktop 24.08 --runtime linux-x64

      - name: Build Flatpak
        run: |
          # Rewrite source to use the current git tag instead of local dir
          sed -i 's|type: dir|type: git|' packaging/flatpak/com.github.Cristiandis.PizzaOven.yml
          sed -i "s|path: ../../|url: https://github.com/Cristiandis/PizzaOven-Avalonia.git\n        tag: ${GITHUB_REF_NAME}|" \
            packaging/flatpak/com.github.Cristiandis.PizzaOven.yml

          flatpak-builder \
            --repo=flatpak-repo \
            --force-clean \
            build-dir \
            packaging/flatpak/com.github.Cristiandis.PizzaOven.yml

          flatpak build-update-repo flatpak-repo

      - name: Create bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            PizzaOven-linux-x64.flatpak \
            com.github.Cristiandis.PizzaOven

      - name: Upload flatpak bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: PizzaOven-linux-x64.flatpak

      - name: Upload flatpak repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: flatpak-repo/

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows
        run: |
          cd PizzaOven
          dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ../publish/windows

      - name: Zip Windows build
        run: |
          Compress-Archive -Path publish/windows/* -DestinationPath PizzaOven-windows-x64.zip

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: PizzaOven-windows-x64.zip

  release:
    needs:
      - build-linux
      - build-flatpak
      - build-windows

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD sha256sum
        run: |
          SHA256=$(sha256sum artifacts/linux-tarball/PizzaOven-linux-x64.tar.gz | awk '{print $1}')
          sed -i "s/sha256sums=('SKIP'/sha256sums=('$SHA256'/" packaging/PKGBUILD

      - name: Push Flatpak repo to gh-pages
        run: |
          cd artifacts/flatpak-repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cristiandis/PizzaOven-Avalonia.git
          git checkout -b flatpak-repo
          git add .
          git commit -m "Flatpak repo update ${{ github.ref_name }}"
          git push --force origin flatpak-repo

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pizza Oven v${{ steps.version.outputs.VERSION }}
          body: |
            ## Pizza Oven v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **Windows**: `PizzaOven-windows-x64.zip`
            - **Linux (tarball)**: `PizzaOven-linux-x64.tar.gz`
            - **Linux (Flatpak bundle)**: `PizzaOven-linux-x64.flatpak`
            - **Linux (Debian/Ubuntu)**: `pizzaoven_${{ steps.version.outputs.VERSION }}_amd64.deb`
            - **Linux (Fedora/RHEL)**: `pizzaoven-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm`
            - **Arch Linux**: Use the PKGBUILD from the `packaging/` folder or install via [AUR](https://aur.archlinux.org/packages/pizzaoven-bin)

            ### Installing the Flatpak (recommended)
            Add the repo once, then install and get automatic updates:
            ```sh
            flatpak remote-add --if-not-exists pizzaoven https://cristiandis.github.io/PizzaOven-Avalonia
            flatpak install pizzaoven com.github.Cristiandis.PizzaOven
            ```

            Or install the bundle directly (no automatic updates):
            ```sh
            flatpak install PizzaOven-linux-x64.flatpak
            ```

            ### Requirements
            - .NET 8 Runtime (not needed for Flatpak — it's bundled)

          files: |
            artifacts/linux-tarball/PizzaOven-linux-x64.tar.gz
            artifacts/flatpak-bundle/PizzaOven-linux-x64.flatpak
            artifacts/deb-package/pizzaoven_*.deb
            artifacts/rpm-package/pizzaoven-*.rpm
            artifacts/windows-zip/PizzaOven-windows-x64.zip
            packaging/PKGBUILD
